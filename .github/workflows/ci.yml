name: CI

on:
  push:
    branches: ["main", "project/**"]
  pull_request:
    branches: ["main"]

jobs:
  test-and-build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore ApprovalWorkflowOrchestrator.sln

      - name: Test
        run: dotnet test ApprovalWorkflowOrchestrator.sln --no-restore

      - name: Build
        run: dotnet build ApprovalWorkflowOrchestrator.sln --configuration Release --no-restore
